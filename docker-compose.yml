services:
  frontend:
    image: department-store-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8888:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: department-store-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3333:3000"
    environment:
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
